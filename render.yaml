# render.yaml — Render Blueprint
# Deploy: connect GitHub repo → Render auto-detects this file.

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: tech-stack-recommender-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: EXA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DIR
        value: /code/chroma_db
      - key: STORAGE_PATH
        value: /code/storage
      - key: FASTAPI_PORT
        value: "8000"
    healthCheckPath: /health
    plan: free

  # ── Frontend (static site) ───────────────────────────────────────────────
  - type: web
    name: tech-stack-recommender-ui
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://tech-stack-recommender-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
